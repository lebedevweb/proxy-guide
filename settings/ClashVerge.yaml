# Profile Template for Clash Verge

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info

profile:
  store-selected: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: RU

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

proxies:
  - name: "MY-PROXY"
    type: socks5
    server: 127.0.0.1
    port: 1080
    username: ""
    password: ""
    udp: true

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - "MY-PROXY"
      - DIRECT

  - name: GLOBAL
    type: select
    proxies:
      - "MY-PROXY"
      - DIRECT

rule-providers:
  voice_ports:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/voice_ports.yaml
    path: ./ruleset/voice_ports.yaml
    interval: 86400

  ai:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/ai.yaml
    path: ./ruleset/ai.yaml
    interval: 86400

  streaming:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/streaming.yaml
    path: ./ruleset/streaming.yaml
    interval: 86400

  work:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/work.yaml
    path: ./ruleset/work.yaml
    interval: 86400

  social:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/social.yaml
    path: ./ruleset/social.yaml
    interval: 86400

  torrents:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/torrents.yaml
    path: ./ruleset/torrents.yaml
    interval: 86400

  storage:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/lebedevweb/proxy-guide/main/rules/ClashVerge/storage.yaml
    path: ./ruleset/storage.yaml
    interval: 86400

rules:
  - RULE-SET,voice_ports,Proxy
  - RULE-SET,ai,Proxy
  - RULE-SET,streaming,Proxy
  - RULE-SET,work,Proxy
  - RULE-SET,social,Proxy
  - RULE-SET,torrents,Proxy
  - RULE-SET,storage,Proxy
  - MATCH,DIRECT
